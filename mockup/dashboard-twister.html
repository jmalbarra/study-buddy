<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --white:  #FAFAF8;
    --ink:    #18160F;
    --red:    #E8314A;
    --yellow: #F0C419;
    --blue:   #2C5EE8;
    --green:  #2EAA6C;
    --muted:  #8A8070;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:390px; height:844px;
    background: var(--white);
    font-family:'DM Sans',sans-serif;
    color: var(--ink);
    overflow:hidden; position:relative;
  }

  /* ── dot field background ── */
  .dots {
    position:absolute; inset:0; pointer-events:none; overflow:hidden;
  }
  .dot {
    position:absolute; border-radius:50%;
    opacity: 0.18;
  }

  /* ── layout ── */
  .wrap { position:relative; z-index:2; padding:32px 22px 0; }

  /* header */
  .header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:22px; }
  .eyebrow { font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
  h1 {
    font-family:'Syne',sans-serif; font-size:38px; font-weight:800;
    line-height:.95; letter-spacing:-1.5px;
  }
  h1 em { color:var(--red); font-style:normal; display:block; }
  .avatar {
    width:48px; height:48px; border-radius:50%;
    background:var(--ink);
    display:flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:var(--yellow);
    flex-shrink:0;
  }

  /* streak */
  .streak {
    background:var(--ink); border-radius:24px; padding:16px 20px;
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px;
  }
  .streak-left { display:flex; align-items:baseline; gap:6px; }
  .streak-num { font-family:'Syne',sans-serif; font-size:40px; font-weight:800; color:var(--yellow); line-height:1; letter-spacing:-1px; }
  .streak-unit { font-size:14px; font-weight:700; color:rgba(250,250,248,.45); }
  .streak-lbl  { font-size:12px; color:rgba(250,250,248,.4); }
  .dot-badge {
    width:44px; height:44px; border-radius:50%;
    background:var(--red);
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
    box-shadow: 3px 4px 0 rgba(232,49,74,.35);
  }

  /* mini cards */
  .mini-row { display:flex; gap:12px; margin-bottom:14px; }
  .mini {
    flex:1; border-radius:20px; padding:14px 16px;
    position:relative; overflow:hidden;
  }
  .mini.blue  { background:var(--blue);  }
  .mini.green { background:var(--green); }
  .mini .val { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; color:#fff; line-height:1; letter-spacing:-0.5px; }
  .mini .lbl { font-size:11px; font-weight:600; color:rgba(255,255,255,.6); margin-top:4px; }
  /* dot accent on mini cards */
  .mini::after {
    content:''; position:absolute;
    width:60px; height:60px; border-radius:50%;
    background:rgba(255,255,255,.12);
    right:-16px; bottom:-16px;
  }

  /* spider card */
  .spider-card {
    background:#fff; border-radius:28px; padding:18px 18px 14px;
    border:1.5px solid rgba(24,22,15,.07);
    box-shadow:0 8px 24px rgba(24,22,15,.07);
  }
  .spider-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:3px; }
  .spider-top h2 { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; }
  .period { font-size:11px; font-weight:700; color:var(--muted); background:rgba(24,22,15,.06); padding:5px 13px; border-radius:999px; }
  .spider-hint { font-size:11px; color:var(--muted); margin-bottom:6px; }

  .spider-wrap { display:flex; justify-content:center; }
  svg .ring  { fill:none; stroke:rgba(24,22,15,.07); stroke-width:1; }
  svg .ax    { stroke:rgba(24,22,15,.06); stroke-width:1; }
  svg .shape { fill:rgba(44,94,232,.14); stroke:var(--blue); stroke-width:2.5; stroke-linejoin:round; }
  svg .vx    { fill:#fff; stroke:var(--blue); stroke-width:2.5; }
  svg .vx.lo { stroke:var(--red); fill:#fff; }
  svg .lbl   { font-family:'DM Sans',sans-serif; font-size:8.5px; fill:var(--muted); font-weight:700; }
  svg .lbl.warn { fill:var(--red); font-weight:800; }

  .tag-row { display:flex; gap:8px; margin-top:12px; }
  .tag {
    flex:1; text-align:center; font-size:11px; font-weight:700;
    padding:9px; border-radius:999px;
  }
  .tag.up   { background:rgba(46,170,108,.13); color:var(--green); }
  .tag.warn { background:rgba(232,49,74,.11);  color:var(--red);   }

  /* area dots legend */
  .legend { display:flex; gap:14px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
  .leg-item { display:flex; align-items:center; gap:5px; font-size:10px; font-weight:700; color:var(--muted); }
  .leg-dot  { width:9px; height:9px; border-radius:50%; }

  /* cta */
  .cta {
    margin-top:14px; background:var(--red); color:#fff;
    border-radius:999px; padding:18px 24px;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow:0 10px 28px rgba(232,49,74,.32);
  }
  .cta-lbl { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; }
  .cta-arr {
    width:38px; height:38px; border-radius:50%;
    background:rgba(255,255,255,.22);
    display:flex; align-items:center; justify-content:center; font-size:18px;
  }

  /* tabbar */
  .tabbar {
    position:absolute; bottom:18px; left:22px; right:22px; height:62px;
    background:var(--ink); border-radius:999px;
    display:flex; align-items:center; justify-content:space-around; padding:0 8px;
    box-shadow:0 14px 32px rgba(24,22,15,.22); z-index:3;
  }
  .tab { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:9px; font-weight:700; color:rgba(250,250,248,.3); }
  .tab.active { background:var(--yellow); color:var(--ink); padding:8px 18px; border-radius:999px; }
  .tab .ico { font-size:14px; line-height:1; }
</style>
</head>
<body>

  <!-- dot field -->
  <div class="dots">
    <!-- red -->
    <div class="dot" style="width:90px;height:90px;background:var(--red);top:-20px;left:30px;"></div>
    <div class="dot" style="width:42px;height:42px;background:var(--red);top:190px;right:18px;"></div>
    <div class="dot" style="width:28px;height:28px;background:var(--red);bottom:180px;left:28px;"></div>
    <!-- yellow -->
    <div class="dot" style="width:72px;height:72px;background:var(--yellow);top:60px;right:-14px;"></div>
    <div class="dot" style="width:50px;height:50px;background:var(--yellow);bottom:120px;right:30px;"></div>
    <!-- blue -->
    <div class="dot" style="width:56px;height:56px;background:var(--blue);top:280px;left:-14px;"></div>
    <div class="dot" style="width:34px;height:34px;background:var(--blue);top:140px;left:14px;opacity:.12;"></div>
    <!-- green -->
    <div class="dot" style="width:68px;height:68px;background:var(--green);bottom:90px;left:-20px;"></div>
    <div class="dot" style="width:38px;height:38px;background:var(--green);top:400px;right:10px;opacity:.14;"></div>
  </div>

  <div class="wrap">
    <div class="header">
      <div>
        <div class="eyebrow">Dom · 7 Jun</div>
        <h1>Vamos,<em>Lucas</em></h1>
      </div>
      <div class="avatar">L</div>
    </div>

    <div class="streak">
      <div class="streak-left">
        <div class="streak-num">18</div>
        <div class="streak-unit">días</div>
        <div class="streak-lbl">— racha activa</div>
      </div>
      <div class="dot-badge">🔥</div>
    </div>

    <div class="mini-row">
      <div class="mini blue">
        <div class="val">52m</div>
        <div class="lbl">practicados hoy</div>
      </div>
      <div class="mini green">
        <div class="val">+18%</div>
        <div class="lbl">vs. semana pasada</div>
      </div>
    </div>

    <div class="spider-card">
      <div class="spider-top">
        <h2>Tu balance</h2>
        <div class="period">Semana ▾</div>
      </div>
      <div class="spider-hint">Cuanto más parejo, más completo tu estudio</div>
      <div class="spider-wrap">
        <svg width="228" height="188" viewBox="0 0 228 188">
          <polygon class="ring" points="114,12 167,35 190,88 167,141 114,164 61,141 38,88 61,35"/>
          <polygon class="ring" points="114,40 154,58 171,88 154,118 114,136 74,118 57,88 74,58"/>
          <polygon class="ring" points="114,68 137,78 147,88 137,98 114,108 91,98 81,88 91,78"/>
          <line class="ax" x1="114" y1="88" x2="114" y2="12"/>
          <line class="ax" x1="114" y1="88" x2="167" y2="35"/>
          <line class="ax" x1="114" y1="88" x2="190" y2="88"/>
          <line class="ax" x1="114" y1="88" x2="167" y2="141"/>
          <line class="ax" x1="114" y1="88" x2="114" y2="164"/>
          <line class="ax" x1="114" y1="88" x2="61" y2="141"/>
          <line class="ax" x1="114" y1="88" x2="38" y2="88"/>
          <line class="ax" x1="114" y1="88" x2="61" y2="35"/>
          <polygon class="shape" points="114,20 159,44 176,88 155,126 114,122 88,132 70,88 92,50"/>
          <circle class="vx"    cx="114" cy="20"  r="4"/>
          <circle class="vx"    cx="159" cy="44"  r="4"/>
          <circle class="vx lo" cx="176" cy="88"  r="4"/>
          <circle class="vx"    cx="155" cy="126" r="4"/>
          <circle class="vx lo" cx="114" cy="122" r="4"/>
          <circle class="vx"    cx="88"  cy="132" r="4"/>
          <circle class="vx"    cx="70"  cy="88"  r="4"/>
          <circle class="vx"    cx="92"  cy="50"  r="4"/>
          <text class="lbl"      x="114" y="5"   text-anchor="middle">Técnica</text>
          <text class="lbl"      x="179" y="29"  text-anchor="middle">Repertorio</text>
          <text class="lbl"      x="208" y="92"  text-anchor="middle">Lectura</text>
          <text class="lbl"      x="179" y="156" text-anchor="middle">Teoría</text>
          <text class="lbl warn" x="114" y="178" text-anchor="middle">Oído !</text>
          <text class="lbl"      x="50"  y="156" text-anchor="middle">Ritmo</text>
          <text class="lbl"      x="20"  y="92"  text-anchor="middle">Improv.</text>
          <text class="lbl"      x="50"  y="29"  text-anchor="middle">Perform.</text>
        </svg>
      </div>

      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Técnica</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--blue)"></div>Repertorio</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>Ritmo</div>
        <div class="leg-item"><div class="leg-dot" style="background:var(--yellow)"></div>Oído</div>
      </div>

      <div class="tag-row">
        <div class="tag up">↑ Ritmo +12%</div>
        <div class="tag warn">◔ Oído necesita amor</div>
      </div>
    </div>

    <div class="cta">
      <div class="cta-lbl">Iniciar práctica</div>
      <div class="cta-arr">→</div>
    </div>
  </div>

  <div class="tabbar">
    <div class="tab active"><span class="ico">◈</span>Inicio</div>
    <div class="tab"><span class="ico">◎</span>Balance</div>
    <div class="tab"><span class="ico">▤</span>Historial</div>
    <div class="tab"><span class="ico">◐</span>Perfil</div>
  </div>

</body>
</html>
