<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --cream: #FFF6EC;
    --coral: #F2613F;
    --plum: #3A2E45;
    --gold: #FFB648;
    --mint: #34A88B;
    --sky: #5DA9E9;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 390px; height: 844px;
    background: var(--cream);
    font-family: 'Inter', sans-serif;
    color: var(--plum);
    position: relative;
    overflow: hidden;
  }

  .blob {
    position:absolute; border-radius: 50%; opacity: 0.18; filter: blur(2px);
  }
  .b1 { width:180px; height:180px; background: var(--sky); top:-70px; right:-60px; }
  .b2 { width:140px; height:140px; background: var(--mint); bottom:60px; left:-60px; }

  .header { padding: 30px 24px 6px; position: relative; z-index: 2; }
  .header .greeting {
    font-family: 'Fraunces', serif;
    font-size: 28px; font-weight: 700;
    color: var(--plum);
  }
  .header .greeting span { color: var(--coral); }
  .header .subtitle { font-size: 14px; color: #8a7d8f; margin-top: 4px; }

  .streak-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--gold), var(--coral));
    color: #fff; font-weight: 700; font-size: 13px;
    padding: 8px 16px; border-radius: 999px;
    margin-top: 16px;
    box-shadow: 0 8px 20px rgba(242,97,63,0.35);
  }

  .stats-row { display:flex; gap: 12px; margin: 18px 24px 4px; position: relative; z-index: 2; }
  .stat-box {
    flex:1; background:#fff; border-radius: 18px; padding: 16px;
    text-align:center; box-shadow: 0 8px 22px rgba(58,46,69,0.08);
    border-bottom: 4px solid var(--mint);
  }
  .stat-box:nth-child(2) { border-bottom-color: var(--coral); }
  .stat-box:nth-child(3) { border-bottom-color: var(--gold); }
  .stat-box .value { font-family:'Fraunces', serif; font-size: 22px; font-weight:700; }
  .stat-box .label { font-size: 11px; color: #9a8e9e; margin-top: 2px; }

  .card {
    background: #fff; border-radius: 24px; margin: 14px 24px; padding: 22px;
    box-shadow: 0 10px 30px rgba(58,46,69,0.10);
    position: relative; z-index: 2;
  }
  .card h2 { font-family:'Fraunces', serif; font-size: 19px; margin-bottom: 6px; }
  .card .hint { font-size: 12px; color: #9a8e9e; margin-bottom: 12px; }

  svg .grid-ring { fill:none; stroke:#f1e8da; stroke-width:1; }
  svg .axis-line { stroke:#f1e8da; stroke-width:1; }
  svg .data-shape { fill: rgba(242,97,63,0.22); stroke: var(--coral); stroke-width: 3; stroke-linejoin: round; }
  svg .axis-label { font-family:'Inter',sans-serif; font-size: 9px; fill:#9a8e9e; font-weight:700; }
  .spider-wrap { display:flex; justify-content:center; }

  .badge-row { display:flex; gap:8px; margin-top: 14px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; font-weight: 700; color: #fff;
    padding: 6px 12px; border-radius: 999px;
  }
  .badge.b-mint { background: var(--mint); }
  .badge.b-sky { background: var(--sky); }
  .badge.b-gold { background: var(--gold); color: var(--plum); }

  .cta {
    margin: 18px 24px; background: var(--coral); color: #fff;
    text-align:center; padding: 18px; border-radius: 20px;
    font-weight: 700; font-size: 15px;
    box-shadow: 0 14px 30px rgba(242,97,63,0.4);
    display:flex; align-items:center; justify-content:center; gap: 10px;
    position: relative; z-index: 2;
  }
  .cta .spark { font-size: 16px; }

  .bottom-nav {
    position:absolute; bottom:0; left:0; right:0; height: 78px;
    background:#fff; border-top: 1px solid #f1e8da;
    display:flex; align-items:center; justify-content:space-around; padding-bottom: 14px;
    z-index: 2;
  }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:5px; font-size:10px; color:#cdc2cf; font-weight:700; }
  .nav-item.active { color: var(--coral); }
  .nav-icon { width: 22px; height: 22px; border-radius: 8px; background: currentColor; opacity: 0.18; }
  .nav-item.active .nav-icon { opacity: 1; background: var(--coral); }
</style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div class="header">
    <div class="greeting">¡Vamos, <span>Lucas</span>!</div>
    <div class="subtitle">Domingo 7 de junio</div>
    <div class="streak-pill">🔥 18 días — ¡tu mejor racha!</div>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="value">52m</div><div class="label">Hoy</div></div>
    <div class="stat-box"><div class="value">6h 40</div><div class="label">Semana</div></div>
    <div class="stat-box"><div class="value">+18%</div><div class="label">vs. semana pasada</div></div>
  </div>

  <div class="card">
    <h2>Tu balance esta semana</h2>
    <div class="hint">Cuanto más parejo, más equilibrado tu estudio</div>
    <div class="spider-wrap">
      <svg width="220" height="190" viewBox="0 0 220 190">
        <polygon class="grid-ring" points="110,16 166,42 192,98 166,154 110,180 54,154 28,98 54,42"/>
        <polygon class="grid-ring" points="110,46 152,64 170,98 152,132 110,150 68,132 46,98 68,64"/>
        <polygon class="grid-ring" points="110,76 138,86 150,98 138,110 110,120 82,110 70,98 82,86"/>
        <line class="axis-line" x1="110" y1="98" x2="110" y2="16"/>
        <line class="axis-line" x1="110" y1="98" x2="166" y2="42"/>
        <line class="axis-line" x1="110" y1="98" x2="192" y2="98"/>
        <line class="axis-line" x1="110" y1="98" x2="166" y2="154"/>
        <line class="axis-line" x1="110" y1="98" x2="110" y2="180"/>
        <line class="axis-line" x1="110" y1="98" x2="54" y2="154"/>
        <line class="axis-line" x1="110" y1="98" x2="28" y2="98"/>
        <line class="axis-line" x1="110" y1="98" x2="54" y2="42"/>
        <polygon class="data-shape" points="110,34 156,56 178,98 148,142 110,134 86,144 64,98 98,58"/>
        <text class="axis-label" x="110" y="10" text-anchor="middle">Técnica</text>
        <text class="axis-label" x="178" y="38" text-anchor="middle">Repert.</text>
        <text class="axis-label" x="206" y="102" text-anchor="middle">Lectura</text>
        <text class="axis-label" x="178" y="166" text-anchor="middle">Teoría</text>
        <text class="axis-label" x="110" y="192" text-anchor="middle">Oído</text>
        <text class="axis-label" x="42" y="166" text-anchor="middle">Ritmo</text>
        <text class="axis-label" x="14" y="102" text-anchor="middle">Improv.</text>
        <text class="axis-label" x="42" y="38" text-anchor="middle">Perform.</text>
      </svg>
    </div>
    <div class="badge-row">
      <div class="badge b-mint">+ Mejoró: Ritmo</div>
      <div class="badge b-sky">Constante: Repertorio</div>
      <div class="badge b-gold">Atención: Oído</div>
    </div>
  </div>

  <div class="cta"><span class="spark">✦</span> Empezar a practicar</div>

  <div class="bottom-nav">
    <div class="nav-item active"><div class="nav-icon"></div>Inicio</div>
    <div class="nav-item"><div class="nav-icon"></div>Araña</div>
    <div class="nav-item"><div class="nav-icon"></div>Historial</div>
    <div class="nav-item"><div class="nav-icon"></div>Perfil</div>
  </div>
</body>
</html>
