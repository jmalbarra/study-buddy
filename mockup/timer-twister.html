<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg:     #141210;
    --red:    #E8314A;
    --yellow: #F5C518;
    --blue:   #2558E8;
    --green:  #1FA362;
    --cream:  #FAFAF8;
    --muted:  #5A5448;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:390px; height:844px;
    background:var(--bg);
    font-family:'DM Sans',sans-serif;
    color:var(--cream);
    overflow:hidden; position:relative;
  }

  .dots { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .d { position:absolute; border-radius:50%; }
  .d.fill { opacity:.1; }
  .d.ring { opacity:.12; border:8px solid; background:transparent; }
  .d.ring.sm { border-width:5px; }

  .wrap { position:relative; z-index:2; height:100%; display:flex; flex-direction:column; padding:28px 24px 24px; }

  .top-bar { display:flex; justify-content:space-between; align-items:center; }
  .back {
    font-size:13px; font-weight:600; color:var(--muted);
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
    padding:8px 16px; border-radius:999px;
  }
  .pomo {
    display:flex; align-items:center; gap:7px;
    font-size:12px; font-weight:700; color:var(--yellow);
    background:rgba(245,197,24,.1); border:1px solid rgba(245,197,24,.2);
    padding:8px 16px; border-radius:999px;
  }
  .pomo-dot { width:7px; height:7px; border-radius:50%; background:var(--yellow); box-shadow:0 0 8px var(--yellow); }

  .area-row { display:flex; justify-content:center; margin-top:28px; }
  .area-pill {
    display:inline-flex; align-items:center; gap:9px;
    border:2.5px solid var(--red);
    padding:10px 24px; border-radius:999px;
    font-family:'Syne',sans-serif; font-size:15px; font-weight:800;
    color:var(--cream);
  }
  .area-dot { width:10px; height:10px; border-radius:50%; background:var(--red); box-shadow:0 0 12px var(--red); }

  .timer-zone { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }

  .ring-wrap { position:relative; }
  .time-over {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .time {
    font-family:'Syne',sans-serif; font-size:72px; font-weight:800;
    letter-spacing:-3px; line-height:1; color:var(--cream);
  }
  .phase { font-size:10px; font-weight:700; letter-spacing:4px; text-transform:uppercase; color:var(--muted); margin-top:6px; }

  .note { font-size:13px; color:var(--muted); margin-top:20px; }
  .note b { color:var(--yellow); }

  .cycle-dots { display:flex; gap:10px; margin-top:16px; align-items:center; }
  .cy { width:10px; height:10px; border-radius:50%; }
  .cy.done   { background:var(--yellow); box-shadow:0 0 8px rgba(245,197,24,.5); }
  .cy.active { background:var(--red);    box-shadow:0 0 12px rgba(232,49,74,.7); width:14px; height:14px; }
  .cy.idle   { background:rgba(255,255,255,.1); }

  .controls { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:22px; }
  .ctrl {
    width:64px; height:64px; border-radius:50%;
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; color:var(--cream);
  }
  .ctrl.primary {
    width:90px; height:90px; border:none;
    background:var(--red);
    font-family:'Syne',sans-serif; font-size:14px; font-weight:800; color:#fff;
    box-shadow:0 12px 32px rgba(232,49,74,.4);
  }

  .next {
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
    border-radius:22px; padding:16px 18px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .next .lbl { font-size:12px; color:var(--muted); }
  .next .lbl b { display:block; color:var(--cream); font-size:13px; margin-bottom:3px; }
  .next-ico {
    width:42px; height:42px; border-radius:14px;
    background:rgba(245,197,24,.1); border:1px solid rgba(245,197,24,.2);
    display:flex; align-items:center; justify-content:center; font-size:20px;
  }
</style>
</head>
<body>

  <div class="dots">
    <div class="d fill" style="width:130px;height:130px;background:var(--red);top:-50px;right:-40px;"></div>
    <div class="d fill" style="width:70px;height:70px;background:var(--yellow);top:80px;left:-20px;"></div>
    <div class="d fill" style="width:55px;height:55px;background:var(--blue);bottom:180px;right:-14px;"></div>
    <div class="d fill" style="width:80px;height:80px;background:var(--green);bottom:70px;left:-24px;"></div>
    <div class="d ring" style="width:100px;height:100px;border-color:var(--yellow);top:160px;right:-28px;"></div>
    <div class="d ring sm" style="width:64px;height:64px;border-color:var(--blue);bottom:280px;left:10px;"></div>
    <div class="d ring" style="width:84px;height:84px;border-color:var(--green);bottom:100px;right:8px;"></div>
  </div>

  <div class="wrap">
    <div class="top-bar">
      <div class="back">← Salir</div>
      <div class="pomo"><div class="pomo-dot"></div>Pomodoro · 2/4</div>
    </div>

    <div class="area-row">
      <div class="area-pill"><div class="area-dot"></div>Técnica</div>
    </div>

    <div class="timer-zone">
      <div class="ring-wrap">
        <svg width="280" height="280" viewBox="0 0 280 280">
          <defs>
            <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#F5C518"/>
              <stop offset="50%"  stop-color="#E8314A"/>
              <stop offset="100%" stop-color="#2558E8"/>
            </linearGradient>
          </defs>
          <circle cx="140" cy="140" r="128" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
          <circle cx="140" cy="140" r="128" fill="none" stroke="url(#rg)" stroke-width="12"
            stroke-dasharray="804" stroke-dashoffset="225"
            stroke-linecap="round" transform="rotate(-90 140 140)"/>
        </svg>
        <div class="time-over">
          <div class="time">18:42</div>
          <div class="phase">Enfocado</div>
        </div>
      </div>

      <div class="note">Llevás <b>52 minutos</b> practicados hoy</div>
      <div class="cycle-dots">
        <div class="cy done"></div>
        <div class="cy active"></div>
        <div class="cy idle"></div>
        <div class="cy idle"></div>
      </div>
    </div>

    <div class="controls">
      <div class="ctrl">Pausa</div>
      <div class="ctrl primary">Listo</div>
      <div class="ctrl">Nota</div>
    </div>

    <div class="next">
      <div class="lbl"><b>Próximo: descanso corto</b>5 min al terminar este ciclo</div>
      <div class="next-ico">☕</div>
    </div>
  </div>

</body>
</html>
