<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --cream: #FAF1E6;
    --terracota: #D17449;
    --plum: #2F2A38;
    --gold: #E3A75D;
    --sage: #8AA083;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 390px; height: 844px;
    background: var(--cream);
    font-family: 'Inter', sans-serif;
    color: var(--plum);
    position: relative;
    overflow: hidden;
  }

  .greca {
    height: 12px; width: 100%;
    background-image: linear-gradient(90deg, var(--terracota) 25%, transparent 25%, transparent 50%, var(--terracota) 50%, var(--terracota) 75%, transparent 75%);
    background-size: 26px 12px;
    opacity: 0.4;
  }

  .header { padding: 28px 24px 6px; }
  .header .greeting {
    font-family: 'Fraunces', serif;
    font-size: 27px; font-weight: 700;
    color: var(--plum);
  }
  .header .greeting span { color: var(--terracota); }
  .header .subtitle { font-size: 14px; color: #8a8270; margin-top: 4px; }

  .streak-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--gold);
    color: var(--plum); font-weight: 700; font-size: 13px;
    padding: 7px 16px; border-radius: 999px;
    margin-top: 14px;
  }

  .stats-row { display:flex; gap: 12px; margin: 16px 24px 4px; }
  .stat-box {
    flex:1; background:#fff; border-radius: 16px; padding: 16px;
    text-align:center; box-shadow: 0 8px 22px rgba(47,42,56,0.07);
  }
  .stat-box .value { font-family:'Fraunces', serif; font-size: 21px; font-weight:700; color: var(--terracota); }
  .stat-box .label { font-size: 11px; color: #9b937f; margin-top: 2px; }

  .card {
    background: #fff; border-radius: 22px; margin: 14px 24px; padding: 22px;
    box-shadow: 0 10px 28px rgba(47,42,56,0.08);
  }
  .card h2 { font-family:'Fraunces', serif; font-size: 18px; margin-bottom: 4px; }
  .card .hint { font-size: 12px; color: #9b937f; margin-bottom: 12px; }

  svg .grid-ring { fill:none; stroke:#f0e6d8; stroke-width:1; }
  svg .axis-line { stroke:#f0e6d8; stroke-width:1; }
  svg .data-shape { fill: rgba(209,116,73,0.20); stroke: var(--terracota); stroke-width: 2.5; stroke-linejoin: round; }
  svg .axis-label { font-family:'Inter',sans-serif; font-size: 9px; fill:#9b937f; font-weight:700; }
  .spider-wrap { display:flex; justify-content:center; }

  .badge-row { display:flex; gap:8px; margin-top: 14px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; font-weight: 700;
    padding: 6px 13px; border-radius: 999px;
  }
  .badge.b-up { background: rgba(138,160,131,0.18); color: #5d7256; }
  .badge.b-watch { background: rgba(227,167,93,0.22); color: #8a652c; }

  .cta {
    margin: 18px 24px; background: var(--plum); color: var(--cream);
    text-align:center; padding: 17px; border-radius: 18px;
    font-weight: 600; font-size: 15px;
    box-shadow: 0 12px 28px rgba(47,42,56,0.22);
    display:flex; align-items:center; justify-content:center; gap: 10px;
  }
  .cta .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); }

  .bottom-nav {
    position:absolute; bottom:0; left:0; right:0; height: 78px;
    background:#fff; border-top: 1px solid #f0e6d8;
    display:flex; align-items:center; justify-content:space-around; padding-bottom: 14px;
  }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:5px; font-size:10px; color:#cbc2b3; font-weight:700; }
  .nav-item.active { color: var(--terracota); }
  .nav-icon { width: 20px; height: 20px; border-radius: 7px; background: currentColor; opacity: 0.2; }
  .nav-item.active .nav-icon { opacity: 1; background: var(--terracota); }
</style>
</head>
<body>
  <div class="greca"></div>
  <div class="header">
    <div class="greeting">Vamos, <span>Lucas</span></div>
    <div class="subtitle">Domingo 7 de junio</div>
    <div class="streak-pill">🔥 18 días seguidos</div>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="value">52m</div><div class="label">Hoy</div></div>
    <div class="stat-box"><div class="value">6h 40</div><div class="label">Semana</div></div>
    <div class="stat-box"><div class="value">+18%</div><div class="label">vs. semana pasada</div></div>
  </div>

  <div class="card">
    <h2>Tu balance esta semana</h2>
    <div class="hint">Cuanto más parejo, más equilibrado tu estudio</div>
    <div class="spider-wrap">
      <svg width="220" height="190" viewBox="0 0 220 190">
        <polygon class="grid-ring" points="110,16 166,42 192,98 166,154 110,180 54,154 28,98 54,42"/>
        <polygon class="grid-ring" points="110,46 152,64 170,98 152,132 110,150 68,132 46,98 68,64"/>
        <polygon class="grid-ring" points="110,76 138,86 150,98 138,110 110,120 82,110 70,98 82,86"/>
        <line class="axis-line" x1="110" y1="98" x2="110" y2="16"/>
        <line class="axis-line" x1="110" y1="98" x2="166" y2="42"/>
        <line class="axis-line" x1="110" y1="98" x2="192" y2="98"/>
        <line class="axis-line" x1="110" y1="98" x2="166" y2="154"/>
        <line class="axis-line" x1="110" y1="98" x2="110" y2="180"/>
        <line class="axis-line" x1="110" y1="98" x2="54" y2="154"/>
        <line class="axis-line" x1="110" y1="98" x2="28" y2="98"/>
        <line class="axis-line" x1="110" y1="98" x2="54" y2="42"/>
        <polygon class="data-shape" points="110,34 156,56 178,98 148,142 110,134 86,144 64,98 98,58"/>
        <text class="axis-label" x="110" y="10" text-anchor="middle">Técnica</text>
        <text class="axis-label" x="178" y="38" text-anchor="middle">Repert.</text>
        <text class="axis-label" x="206" y="102" text-anchor="middle">Lectura</text>
        <text class="axis-label" x="178" y="166" text-anchor="middle">Teoría</text>
        <text class="axis-label" x="110" y="192" text-anchor="middle">Oído</text>
        <text class="axis-label" x="42" y="166" text-anchor="middle">Ritmo</text>
        <text class="axis-label" x="14" y="102" text-anchor="middle">Improv.</text>
        <text class="axis-label" x="42" y="38" text-anchor="middle">Perform.</text>
      </svg>
    </div>
    <div class="badge-row">
      <div class="badge b-up">↑ Mejoró: Ritmo</div>
      <div class="badge b-watch">Atención: Oído</div>
    </div>
  </div>

  <div class="cta"><span class="dot"></span> Iniciar sesión de práctica</div>

  <div class="bottom-nav">
    <div class="nav-item active"><div class="nav-icon"></div>Inicio</div>
    <div class="nav-item"><div class="nav-icon"></div>Araña</div>
    <div class="nav-item"><div class="nav-icon"></div>Historial</div>
    <div class="nav-item"><div class="nav-icon"></div>Perfil</div>
  </div>
</body>
</html>
