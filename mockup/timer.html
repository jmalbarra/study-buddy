<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --cream: #F5EFE6;
    --terracota: #C1623A;
    --indigo: #2B2D3E;
    --gold: #D4A95E;
    --sage: #7C9070;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 390px; height: 844px;
    background: var(--indigo);
    font-family: 'Inter', sans-serif;
    color: var(--cream);
    position: relative;
    overflow: hidden;
  }

  .greca-top {
    height: 14px; width: 100%;
    background-image: linear-gradient(90deg, var(--gold) 25%, transparent 25%, transparent 50%, var(--gold) 50%, var(--gold) 75%, transparent 75%);
    background-size: 28px 14px;
    opacity: 0.5;
  }

  .top-bar {
    display:flex; justify-content:space-between; align-items:center;
    padding: 24px 24px 0;
    font-size: 13px; color: #9598ad;
  }
  .area-pill {
    display:inline-flex; align-items:center; gap:8px;
    background: rgba(212,169,94,0.15);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 8px 18px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 13px;
    margin: 28px auto 0;
    width: fit-content;
  }
  .area-row { display:flex; justify-content:center; }

  .timer-wrap {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    margin-top: 50px;
  }
  .ring {
    width: 260px; height: 260px;
    border-radius: 50%;
    border: 10px solid rgba(245,239,230,0.08);
    border-top-color: var(--terracota);
    border-right-color: var(--terracota);
    display:flex; align-items:center; justify-content:center;
    position: relative;
    transform: rotate(-45deg);
  }
  .ring .time {
    transform: rotate(45deg);
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 700;
    color: var(--cream);
  }
  .session-label {
    margin-top: 28px;
    font-size: 14px;
    color: #b9bccb;
    text-align: center;
  }
  .session-label b { color: var(--gold); }

  .controls {
    display:flex; justify-content:center; gap: 18px;
    margin-top: 42px;
  }
  .ctrl-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 13px; font-weight:600;
  }
  .ctrl-btn.primary {
    background: var(--terracota);
    color: var(--cream);
    width: 80px; height: 80px;
    box-shadow: 0 12px 30px rgba(193,98,58,0.4);
  }
  .ctrl-btn.secondary {
    background: rgba(245,239,230,0.08);
    color: var(--cream);
    border: 1px solid rgba(245,239,230,0.2);
  }

  .pomodoro-card {
    margin: 56px 28px 0;
    background: rgba(245,239,230,0.06);
    border: 1px solid rgba(245,239,230,0.12);
    border-radius: 18px;
    padding: 16px 18px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .pomodoro-card .lbl { font-size: 13px; color: #b9bccb; }
  .pomodoro-card .lbl b { color: var(--cream); display:block; font-size: 14px; margin-bottom:2px; }
  .dot-row { display:flex; gap:6px; }
  .dot-row .d { width:8px; height:8px; border-radius:50%; background: rgba(245,239,230,0.2); }
  .dot-row .d.filled { background: var(--gold); }
</style>
</head>
<body>
  <div class="greca-top"></div>
  <div class="top-bar">
    <span>← Cancelar</span>
    <span>Pomodoro · ciclo 2/4</span>
  </div>

  <div class="area-row">
    <div class="area-pill">● Técnica</div>
  </div>

  <div class="timer-wrap">
    <div class="ring"><div class="time">18:42</div></div>
    <div class="session-label">Llevás <b>52 minutos</b> practicados hoy</div>
  </div>

  <div class="controls">
    <div class="ctrl-btn secondary">Pausar</div>
    <div class="ctrl-btn primary">Listo</div>
    <div class="ctrl-btn secondary">Notas</div>
  </div>

  <div class="pomodoro-card">
    <div class="lbl"><b>Próximo: descanso corto</b>5 minutos al terminar este ciclo</div>
    <div class="dot-row">
      <div class="d filled"></div>
      <div class="d filled"></div>
      <div class="d"></div>
      <div class="d"></div>
    </div>
  </div>
</body>
</html>
