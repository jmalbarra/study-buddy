<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg:      #1C1208;
    --mustard: #C9971A;
    --rust:    #C15A2D;
    --cream:   #F0E6D2;
    --olive:   #5C7042;
    --chrome:  #E8D89A;
    --muted:   #7A6040;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:390px; height:844px;
    background: var(--bg);
    font-family:'DM Sans',sans-serif;
    color: var(--cream);
    position:relative; overflow:hidden;
  }

  /* warm glow behind ring */
  .glow {
    position:absolute;
    width:380px; height:380px; border-radius:50%;
    background: radial-gradient(circle, rgba(201,151,26,0.18) 0%, transparent 68%);
    top: 220px; left:5px;
    pointer-events:none;
  }

  /* groovy arc top decoration */
  .arc-deco {
    position:absolute; top:-90px; right:-90px;
    width:240px; height:240px; border-radius:50%;
    border: 28px solid rgba(201,151,26,0.12);
    pointer-events:none;
  }
  .arc-deco2 {
    position:absolute; top:-50px; right:-50px;
    width:160px; height:160px; border-radius:50%;
    border: 16px solid rgba(193,90,45,0.10);
    pointer-events:none;
  }

  .wrap { position:relative; z-index:2; height:100%; display:flex; flex-direction:column; padding:28px 24px 26px; }

  .top-bar { display:flex; justify-content:space-between; align-items:center; }
  .back {
    font-size:13px; font-weight:600; color: var(--muted);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 8px 16px; border-radius:999px;
  }
  .pomo-chip {
    font-size:12px; font-weight:700; color: var(--mustard);
    background: rgba(201,151,26,0.12);
    border: 1px solid rgba(201,151,26,0.25);
    padding: 8px 16px; border-radius:999px;
  }

  .area-row { display:flex; justify-content:center; margin-top:30px; }
  .area-pill {
    display:inline-flex; align-items:center; gap:8px;
    border: 2px solid var(--mustard);
    color: var(--mustard);
    padding:10px 22px; border-radius:999px;
    font-family:'Syne',sans-serif; font-size:14px; font-weight:800;
    letter-spacing:-0.3px;
    box-shadow: 3px 4px 0 rgba(201,151,26,0.25);
  }
  .area-dot { width:8px; height:8px; border-radius:50%; background:var(--mustard); box-shadow:0 0 10px var(--mustard); }

  .timer-zone { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }

  /* chrome ring built with SVG */
  .ring-svg { position:relative; }
  .ring-svg svg { display:block; }
  .time-inner {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .time {
    font-family:'Syne',sans-serif; font-size:70px; font-weight:800;
    letter-spacing:-3px; line-height:1;
    color: var(--cream);
  }
  .phase {
    font-size:10px; font-weight:700; letter-spacing:3.5px;
    text-transform:uppercase; color: var(--muted); margin-top:4px;
  }

  .session-note { font-size:13px; color:var(--muted); margin-top:22px; }
  .session-note b { color:var(--chrome); font-weight:700; }

  .cycle-row { display:flex; gap:10px; margin-top:18px; align-items:center; }
  .cy { width:10px; height:10px; border-radius:50%; }
  .cy.done { background:var(--mustard); box-shadow:0 0 8px rgba(201,151,26,0.6); }
  .cy.now  { background:var(--rust); box-shadow:0 0 12px rgba(193,90,45,0.8); width:14px; height:14px; }
  .cy.next { background:rgba(255,255,255,0.1); }

  .controls { display:flex; align-items:center; justify-content:center; gap:14px; }
  .ctrl {
    width:64px; height:64px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    font-size:12px; font-weight:700; color: var(--cream);
  }
  .ctrl.primary {
    width:88px; height:88px;
    background: var(--mustard);
    color: var(--bg);
    border:none;
    font-family:'Syne',sans-serif; font-size:14px; font-weight:800;
    box-shadow: 4px 6px 0 rgba(201,151,26,0.35);
  }

  .next-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius:22px;
    padding:16px 18px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .next-card .lbl { font-size:12px; color:var(--muted); }
  .next-card .lbl b { display:block; color:var(--cream); font-size:13px; margin-bottom:3px; }
  .ico-cup {
    width:40px; height:40px; border-radius:14px;
    background: rgba(201,151,26,0.12);
    border:1px solid rgba(201,151,26,0.2);
    display:flex; align-items:center; justify-content:center; font-size:18px;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="arc-deco"></div>
  <div class="arc-deco2"></div>

  <div class="wrap">
    <div class="top-bar">
      <div class="back">← Salir</div>
      <div class="pomo-chip">Pomodoro · 2/4</div>
    </div>

    <div class="area-row">
      <div class="area-pill"><span class="area-dot"></span>Técnica</div>
    </div>

    <div class="timer-zone">
      <div class="ring-svg">
        <svg width="288" height="288" viewBox="0 0 288 288">
          <defs>
            <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#E8D89A"/>
              <stop offset="50%" stop-color="#C9971A"/>
              <stop offset="100%" stop-color="#C15A2D"/>
            </linearGradient>
          </defs>
          <!-- track -->
          <circle cx="144" cy="144" r="132" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="14"/>
          <!-- progress ~72% -->
          <circle cx="144" cy="144" r="132" fill="none" stroke="url(#cg)" stroke-width="14"
            stroke-dasharray="828" stroke-dashoffset="232"
            stroke-linecap="round" transform="rotate(-90 144 144)"/>
        </svg>
        <div class="time-inner">
          <div class="time">18:42</div>
          <div class="phase">Enfocado</div>
        </div>
      </div>
      <div class="session-note">Llevás <b>52 minutos</b> practicados hoy</div>
      <div class="cycle-row">
        <div class="cy done"></div>
        <div class="cy now"></div>
        <div class="cy next"></div>
        <div class="cy next"></div>
      </div>
    </div>

    <div class="controls" style="margin-bottom:20px;">
      <div class="ctrl">Pausa</div>
      <div class="ctrl primary">Listo</div>
      <div class="ctrl">Nota</div>
    </div>

    <div class="next-card">
      <div class="lbl"><b>Próximo: descanso corto</b>5 minutos al terminar este ciclo</div>
      <div class="ico-cup">☕</div>
    </div>
  </div>
</body>
</html>
